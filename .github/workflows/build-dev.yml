              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }


  build-docker:
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'build') || (github.event_name == 'pull_request' && github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'build')) }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install CD deps
        shell: bash
        run: |
          pip install -r requirements-cd.txt

      - name: Compute Dev Version
        id: dev_version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --quiet || true
          BASE_VERSION=$(bump-my-version show current_version || echo "0.0.0")
          if [[ $BASE_VERSION =~ ^v ]]; then
            TAG_BASE="$BASE_VERSION"
            BASE_NO_V=${BASE_VERSION#v}
          else
            TAG_BASE="v$BASE_VERSION"
            BASE_NO_V="$BASE_VERSION"
          fi
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*" 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COUNT=$(git rev-list ${LAST_TAG}..HEAD --count)
          else
            COUNT=$(git rev-list HEAD --count)
          fi
            SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            DEV_VERSION="${BASE_NO_V}-pr${{ github.event.pull_request.number }}-${SHORT_SHA}"
          else
            DEV_VERSION="${BASE_NO_V}-dev${COUNT}-${SHORT_SHA}"
          fi
          echo "Computed dev version for docker: $DEV_VERSION (base: $BASE_NO_V)"
          echo "dev_version=$DEV_VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine Docker Tag
        id: docker_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            DOCKER_TAG="pr${{ github.event.pull_request.number }}"
          else
            DOCKER_TAG="dev"
          fi
          echo "docker_tag=$DOCKER_TAG" >> "$GITHUB_OUTPUT"
          echo "Using Docker tag: $DOCKER_TAG"

      - name: Hack bumpversion config with dev version
        if: ${{ steps.dev_version.outputs.dev_version != '' }}
        env:
          DEV_VERSION: ${{ steps.dev_version.outputs.dev_version }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Injecting DEV_VERSION into .bumpversion.toml (hack)"
          cp .bumpversion.toml .bumpversion.toml.bak
          python3 - <<'PY'
          import os, pathlib, re
          DEV=os.environ['DEV_VERSION']
          path=pathlib.Path('.bumpversion.toml')
          text=path.read_text()
          # Replace all occurrences of {new_version} (with braces) by the actual dev version string
          new_text=text.replace('{new_version}', DEV)
          path.write_text(new_text)
          print('Replaced {new_version} placeholders with', DEV)
          # Show resulting lines referencing replace patterns
          for line in new_text.splitlines():
              if 'replace =' in line:
                  print('CONFIG:', line)
          PY
          echo "Diff preview (first 30 lines):"
          head -n 30 .bumpversion.toml

      - name: Replace project versions with dev version (ephemeral)
        if: ${{ steps.dev_version.outputs.dev_version != '' }}
        env:
          DEV_VERSION: ${{ steps.dev_version.outputs.dev_version }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Running bump-my-version replace using injected config"
          bump-my-version replace --allow-dirty || { echo "bump-my-version replace failed" >&2; exit 1; }
          echo "Replacement complete. Showing updated versions:"
          grep -E 'version =|"version":' pyproject.toml frontend/app/package.json || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Publish dev frontend image
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: finanze/finanze-frontend
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          default_branch: develop
          workdir: frontend
          platforms: linux/amd64,linux/arm64/v8
          buildargs: VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }},VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          tags: ${{ steps.docker_tag.outputs.docker_tag }}

      - name: Publish selenium image
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: finanze/finanze
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          default_branch: develop
          platforms: linux/amd64,linux/arm64/v8
          buildargs: SELENIUM_SUPPORT=true
          tags: ${{ steps.docker_tag.outputs.docker_tag }}-selenium

      - name: Publish no-selenium image
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: finanze/finanze
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          default_branch: develop
          platforms: linux/amd64,linux/arm64/v8
          buildargs: SELENIUM_SUPPORT=false
          tags: ${{ steps.docker_tag.outputs.docker_tag }},${{ steps.docker_tag.outputs.docker_tag }}-no-selenium

      - name: Update PR comment with Docker status
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.dev_version.outputs.dev_version }}';
            const runId = context.runId;
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const dockerTag = `pr${prNumber}`;
            const jobStatus = '${{ job.status }}';

            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: runId,
            });

            const platformMap = {
              'macos-latest': { label: 'macOS', arch: 'ARM64 (Apple Silicon)', icon: '🍎', type: '.dmg' },
              'macos-15-intel': { label: 'macOS', arch: 'Intel x64', icon: '🍎', type: '.dmg' },
              'ubuntu-latest': { label: 'Linux', arch: 'x64', icon: '🐧', type: '.AppImage' },
              'windows-latest': { label: 'Windows', arch: 'x64', icon: '🪟', type: '.exe' },
            };

            const formatSize = (bytes) => {
              const mb = bytes / 1024 / 1024;
              return mb >= 1024 ? `${(mb / 1024).toFixed(2)} GB` : `${mb.toFixed(1)} MB`;
            };

            let desktopRows = '';
            for (const [osKey, info] of Object.entries(platformMap)) {
              const artifactName = `finanze-${version}-${osKey}`;
              const artifact = artifacts.artifacts.find(a => a.name === artifactName);
              if (artifact) {
                const size = formatSize(artifact.size_in_bytes);
                const downloadUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${artifact.id}`;
                desktopRows += `| ${info.icon} ${info.label} | ${info.arch} | \`${info.type}\` | ${size} | [Download](${downloadUrl}) |\n`;
              } else {
                desktopRows += `| ${info.icon} ${info.label} | ${info.arch} | \`${info.type}\` | — | ⏳ Building... |\n`;
              }
            }

            let dockerSection;
            if (jobStatus === 'success') {
              dockerSection = [
                `| Image | Tag | Pull Command |`,
                `|-------|-----|-------------|`,
                `| \`finanze/finanze\` | \`${dockerTag}\` | \`docker pull finanze/finanze:${dockerTag}\` |`,
                `| \`finanze/finanze\` | \`${dockerTag}-selenium\` | \`docker pull finanze/finanze:${dockerTag}-selenium\` |`,
                `| \`finanze/finanze-frontend\` | \`${dockerTag}\` | \`docker pull finanze/finanze-frontend:${dockerTag}\` |`,
              ].join('\n');
            } else {
              dockerSection = `❌ Docker build failed — check the [workflow run](https://github.com/${owner}/${repo}/actions/runs/${runId}) for details.`;
            }

            const androidArtifactName = `finanze-${version}-android`;
            const androidArtifact = artifacts.artifacts.find(a => a.name === androidArtifactName);
            let androidSection;
            if (androidArtifact) {
              const size = formatSize(androidArtifact.size_in_bytes);
              const downloadUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${androidArtifact.id}`;
              androidSection = [
                `| Variant | Type | Size | Link |`,
                `|---------|------|------|------|`,
                `| Full | \`.apk\` | ${size} | [Download](${downloadUrl}) |`,
                `| Full | \`.aab\` | ${size} | [Download](${downloadUrl}) |`,
                `| Store | \`.apk\` | ${size} | [Download](${downloadUrl}) |`,
                `| Store | \`.aab\` | ${size} | [Download](${downloadUrl}) |`,
              ].join('\n');
            } else {
              androidSection = [
                `| Variant | Type | Size | Link |`,
                `|---------|------|------|------|`,
                `| Full | \`.apk\` | — | ⏳ Building... |`,
                `| Full | \`.aab\` | — | ⏳ Building... |`,
                `| Store | \`.apk\` | — | ⏳ Building... |`,
                `| Store | \`.aab\` | — | ⏳ Building... |`,
              ].join('\n');
            }

            const body = [
              `<!-- finanze-build-artifacts -->`,
              `## 📦 Build Artifacts`,
              ``,
              `**Version:** \`${version}\``,
              `**Workflow run:** [#${runId}](https://github.com/${owner}/${repo}/actions/runs/${runId})`,
              ``,
              `### Desktop Builds`,
              ``,
              `| Platform | Architecture | Type | Size | Link |`,
              `|----------|-------------|------|------|------|`,
              desktopRows.trim(),
              ``,
              `### 📱 Android Builds`,
              ``,
              androidSection,
              ``,
              `### 🐳 Docker Images`,
              ``,
              dockerSection,
            ].join('\n');

            const marker = '<!-- finanze-build-artifacts -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }
