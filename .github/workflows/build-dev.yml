name: Build Dev

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
    types: [ labeled, synchronize ]

permissions:
  pull-requests: write
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  pr-comment-init:
    if: ${{ github.event_name == 'pull_request' && ((github.event.action == 'labeled' && github.event.label.name == 'build') || (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'build'))) }}
    runs-on: ubuntu-latest
    steps:
      - name: Post initial build comment
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.runId;
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const dockerTag = `pr${prNumber}`;

            const body = [
              `<!-- finanze-build-artifacts -->`,
              `## 📦 Build Artifacts`,
              ``,
              `**Workflow run:** [#${runId}](https://github.com/${owner}/${repo}/actions/runs/${runId})`,
              ``,
              `### Desktop Builds`,
              ``,
              `| Platform | Architecture | Type | Size | Link |`,
              `|----------|-------------|------|------|------|`,
              `| 🍎 macOS | ARM64 (Apple Silicon) | \`.dmg\` | — | ⏳ Building... |`,
              `| 🍎 macOS | Intel x64 | \`.dmg\` | — | ⏳ Building... |`,
              `| 🐧 Linux | x64 | \`.AppImage\` | — | ⏳ Building... |`,
              `| 🪟 Windows | x64 | \`.exe\` | — | ⏳ Building... |`,
              ``,
              `### � Android Builds`,
              ``,
              `| Variant | Type | Size | Link |`,
              `|---------|------|------|------|`,
              `| Full | \`.apk\` | — | ⏳ Building... |`,
              `| Full | \`.aab\` | — | ⏳ Building... |`,
              `| Store | \`.apk\` | — | ⏳ Building... |`,
              `| Store | \`.aab\` | — | ⏳ Building... |`,
              ``,
              `### �🐳 Docker Images`,
              ``,
              `⏳ Building on tag \`${dockerTag}\`...`,
            ].join('\n');

            const marker = '<!-- finanze-build-artifacts -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }


  build-app:
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'build') || (github.event_name == 'pull_request' && github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'build')) }}

    strategy:
      matrix:
        os: [ macos-latest, macos-15-intel, ubuntu-latest, windows-latest ]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/app/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/app/.nvmrc

      - name: Setup python (non-macOS)
        if: ${{ !startsWith(matrix.os, 'macos-') }}
        uses: actions/setup-python@v6
        with:
          python-version: 3.14.2

      - name: Setup python (macOS)
        if: ${{ startsWith(matrix.os, 'macos-') }}
        shell: bash
        run: |
          brew install pyenv pyenv-virtualenv

          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PATH"
          
          # Initialize pyenv and pyenv-virtualenv for the current shell
          eval "$(pyenv init --path)" # Ensures pyenv command is found via shims/bin
          eval "$(pyenv init -)"      # Sets up shims and other integrations
          eval "$(pyenv virtualenv-init -)" # Defines 'pyenv activate' and other venv functions

          pyenv install --skip-existing 3.14.2
          
          # Create virtualenv if it doesn't exist
          if ! pyenv virtualenvs --bare | grep -q "^finanze$"; then
            pyenv virtualenv 3.14.2 finanze
          else
            echo "Virtualenv 'finanze' already exists."
          fi
          
          # Activate for this script block (confirms setup)
          pyenv activate finanze
          
          # Set for pyenv to use this venv in the current directory context
          pyenv local finanze
          
          # Make pyenv and the virtualenv available to subsequent steps in the job
          echo "$PYENV_ROOT/bin" >> $GITHUB_PATH
          echo "$PYENV_ROOT/shims" >> $GITHUB_PATH
          echo "$PYENV_ROOT/versions/finanze/bin" >> $GITHUB_PATH

      - name: Install CD, packaging & runtime deps
        shell: bash
        run: |
          pip install -r requirements-packaging.txt -r requirements.txt -r requirements-cd.txt

      - name: Setup virtual env (non-Windows)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        run: |
          python3 -m venv $HOME/venv
          echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Compute Dev Version
        id: dev_version
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v bump-my-version &> /dev/null; then
            echo "bump-my-version not found after installation." >&2
            exit 1
          fi
          git fetch --tags --quiet || true
          BASE_VERSION=$(bump-my-version show current_version || echo "0.0.0")
          if [[ $BASE_VERSION =~ ^v ]]; then
            TAG_BASE="$BASE_VERSION"
            BASE_NO_V=${BASE_VERSION#v}
          else
            TAG_BASE="v$BASE_VERSION"
            BASE_NO_V="$BASE_VERSION"
          fi
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*" 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COUNT=$(git rev-list ${LAST_TAG}..HEAD --count)
          else
            COUNT=$(git rev-list HEAD --count)
          fi
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            DEV_VERSION="${BASE_NO_V}-pr${{ github.event.pull_request.number }}-${SHORT_SHA}"
          else
            DEV_VERSION="${BASE_NO_V}-dev${COUNT}-${SHORT_SHA}"
          fi
          echo "Computed dev version: $DEV_VERSION (base: $BASE_NO_V)"
          echo "dev_version=$DEV_VERSION" >> "$GITHUB_OUTPUT"

      - name: Hack bumpversion config with dev version
        if: ${{ steps.dev_version.outputs.dev_version != '' }}
        env:
          DEV_VERSION: ${{ steps.dev_version.outputs.dev_version }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Injecting DEV_VERSION into .bumpversion.toml (hack)"
          cp .bumpversion.toml .bumpversion.toml.bak
          python3 - <<'PY'
          import os, pathlib, re
          DEV=os.environ['DEV_VERSION']
          path=pathlib.Path('.bumpversion.toml')
          text=path.read_text()
          # Replace all occurrences of {new_version} (with braces) by the actual dev version string
          new_text=text.replace('{new_version}', DEV)
          path.write_text(new_text)
          print('Replaced {new_version} placeholders with', DEV)
          # Show resulting lines referencing replace patterns
          for line in new_text.splitlines():
              if 'replace =' in line:
                  print('CONFIG:', line)
          PY
          echo "Diff preview (first 30 lines):"
          head -n 30 .bumpversion.toml

      - name: Replace project versions with dev version (ephemeral)
        if: ${{ steps.dev_version.outputs.dev_version != '' }}
        env:
          DEV_VERSION: ${{ steps.dev_version.outputs.dev_version }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Running bump-my-version replace using injected config"
          bump-my-version replace --allow-dirty || { echo "bump-my-version replace failed" >&2; exit 1; }
          echo "Replacement complete. Showing updated versions:"
          grep -E 'version =|"version":' pyproject.toml frontend/app/package.json || true

      - name: Package
        env:
          FINANZE_DEV_VERSION: ${{ steps.dev_version.outputs.dev_version }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          CSC_LINK: ${{ startsWith(matrix.os, 'macos-') && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ startsWith(matrix.os, 'macos-') && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ startsWith(matrix.os, 'macos-') && secrets.APPLE_TEAM_ID || '' }}
        shell: bash
        run: |
          echo "Using dev version for artifact naming only: $FINANZE_DEV_VERSION"
          
          # Determine OS and arch parameters
          OS_PARAM=""
          
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            OS_PARAM="--os mac --arch arm64"
          elif [[ "${{ matrix.os }}" == "macos-15-intel" ]]; then
            OS_PARAM="--os mac --arch x64"
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            OS_PARAM="--os linux"
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            OS_PARAM="--os win"
          fi
          
          python3 package.py --target full $OS_PARAM

      - name: Write Dev Version File
        if: ${{ steps.dev_version.outputs.dev_version != '' }}
        shell: bash
        run: |
          echo "${{ steps.dev_version.outputs.dev_version }}" > DEV_VERSION

      - name: Upload macOS artifact
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v6
        with:
          name: finanze-${{ steps.dev_version.outputs.dev_version }}-${{ matrix.os }}
          path: dist/*.dmg
          if-no-files-found: warn
          include-hidden-files: false

      - name: Upload Ubuntu artifact
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: actions/upload-artifact@v6
        with:
          name: finanze-${{ steps.dev_version.outputs.dev_version }}-${{ matrix.os }}
          path: dist/*.AppImage
          if-no-files-found: warn
          include-hidden-files: false

      - name: Upload Windows artifact
        if: ${{ matrix.os == 'windows-latest' }}
        uses: actions/upload-artifact@v6
        with:
          name: finanze-${{ steps.dev_version.outputs.dev_version }}-${{ matrix.os }}
          path: dist/*.exe
          if-no-files-found: warn
          include-hidden-files: false

      - name: Update PR comment with build status
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.dev_version.outputs.dev_version }}';
            const runId = context.runId;
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: runId,
            });

            const platformMap = {
              'macos-latest': { label: 'macOS', arch: 'ARM64 (Apple Silicon)', icon: '🍎', type: '.dmg' },
              'macos-15-intel': { label: 'macOS', arch: 'Intel x64', icon: '🍎', type: '.dmg' },
              'ubuntu-latest': { label: 'Linux', arch: 'x64', icon: '🐧', type: '.AppImage' },
              'windows-latest': { label: 'Windows', arch: 'x64', icon: '🪟', type: '.exe' },
            };

            const formatSize = (bytes) => {
              const mb = bytes / 1024 / 1024;
              return mb >= 1024 ? `${(mb / 1024).toFixed(2)} GB` : `${mb.toFixed(1)} MB`;
            };

            let rows = '';
            for (const [osKey, info] of Object.entries(platformMap)) {
              const artifactName = `finanze-${version}-${osKey}`;
              const artifact = artifacts.artifacts.find(a => a.name === artifactName);
              if (artifact) {
                const size = formatSize(artifact.size_in_bytes);
                const downloadUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${artifact.id}`;
                rows += `| ${info.icon} ${info.label} | ${info.arch} | \`${info.type}\` | ${size} | [Download](${downloadUrl}) |\n`;
              } else {
                rows += `| ${info.icon} ${info.label} | ${info.arch} | \`${info.type}\` | — | ⏳ Building... |\n`;
              }
            }

            const androidArtifactName = `finanze-${version}-android`;
            const androidArtifact = artifacts.artifacts.find(a => a.name === androidArtifactName);
            let androidSection;
            if (androidArtifact) {
              const size = formatSize(androidArtifact.size_in_bytes);
              const downloadUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${androidArtifact.id}`;
              androidSection = [
                `| Variant | Type | Size | Link |`,
                `|---------|------|------|------|`,
                `| Full | \`.apk\` | ${size} | [Download](${downloadUrl}) |`,
                `| Full | \`.aab\` | ${size} | [Download](${downloadUrl}) |`,
                `| Store | \`.apk\` | ${size} | [Download](${downloadUrl}) |`,
                `| Store | \`.aab\` | ${size} | [Download](${downloadUrl}) |`,
              ].join('\n');
            } else {
              androidSection = [
                `| Variant | Type | Size | Link |`,
                `|---------|------|------|------|`,
                `| Full | \`.apk\` | — | ⏳ Building... |`,
                `| Full | \`.aab\` | — | ⏳ Building... |`,
                `| Store | \`.apk\` | — | ⏳ Building... |`,
                `| Store | \`.aab\` | — | ⏳ Building... |`,
              ].join('\n');
            }

            const dockerTag = `pr${prNumber}`;

            const body = [
              `<!-- finanze-build-artifacts -->`,
              `## 📦 Build Artifacts`,
              ``,
              `**Version:** \`${version}\``,
              `**Workflow run:** [#${runId}](https://github.com/${owner}/${repo}/actions/runs/${runId})`,
              ``,
              `### Desktop Builds`,
              ``,
              `| Platform | Architecture | Type | Size | Link |`,
              `|----------|-------------|------|------|------|`,
              rows.trim(),
              ``,
              `### 📱 Android Builds`,
              ``,
              androidSection,
              ``,
              `### 🐳 Docker Images`,
              ``,
              `⏳ Building on tag \`${dockerTag}\`...`,
            ].join('\n');

            const marker = '<!-- finanze-build-artifacts -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }


  build-android:
    if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'build') || (github.event_name == 'pull_request' && github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'build')) }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/app/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/app/.nvmrc

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14.2

      - name: Install Python build deps
        run: pip install python-minifier

      - name: Install CD deps
        run: pip install -r requirements-cd.txt

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;28.0.13004108'

      - name: Install frontend dependencies
        working-directory: frontend/app
        run: pnpm install --frozen-lockfile

      - name: Build native TLS client (Android)
        working-directory: frontend/app
        run: |
          bash native/tlsclient/build.sh --platform android
          bash native/tlsclient/install.sh

      - name: Setup Pyodide & Python wheels
        working-directory: frontend/app
        run: pnpm install:pyodide

      - name: Compute Dev Version
        id: dev_version
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v bump-my-version &> /dev/null; then
            echo "bump-my-version not found after installation." >&2
            exit 1
          fi
          git fetch --tags --quiet || true
          BASE_VERSION=$(bump-my-version show current_version || echo "0.0.0")
          if [[ $BASE_VERSION =~ ^v ]]; then
            TAG_BASE="$BASE_VERSION"
            BASE_NO_V=${BASE_VERSION#v}
          else
            TAG_BASE="v$BASE_VERSION"
            BASE_NO_V="$BASE_VERSION"
          fi
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v[0-9]*" 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COUNT=$(git rev-list ${LAST_TAG}..HEAD --count)
          else
            COUNT=$(git rev-list HEAD --count)
          fi
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            DEV_VERSION="${BASE_NO_V}-pr${{ github.event.pull_request.number }}-${SHORT_SHA}"
          else
            DEV_VERSION="${BASE_NO_V}-dev${COUNT}-${SHORT_SHA}"
          fi
          echo "Computed dev version: $DEV_VERSION (base: $BASE_NO_V)"
          echo "dev_version=$DEV_VERSION" >> "$GITHUB_OUTPUT"

      - name: Hack bumpversion config with dev version
        if: ${{ steps.dev_version.outputs.dev_version != '' }}
        env:
          DEV_VERSION: ${{ steps.dev_version.outputs.dev_version }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Injecting DEV_VERSION into .bumpversion.toml (hack)"
          cp .bumpversion.toml .bumpversion.toml.bak
          python3 - <<'PY'
          import os, pathlib, re
          DEV=os.environ['DEV_VERSION']
          path=pathlib.Path('.bumpversion.toml')
          text=path.read_text()
          new_text=text.replace('{new_version}', DEV)
          path.write_text(new_text)
          print('Replaced {new_version} placeholders with', DEV)
          for line in new_text.splitlines():
              if 'replace =' in line:
                  print('CONFIG:', line)
          PY
          echo "Diff preview (first 30 lines):"
          head -n 30 .bumpversion.toml

      - name: Replace project versions with dev version (ephemeral)
        if: ${{ steps.dev_version.outputs.dev_version != '' }}
        env:
          DEV_VERSION: ${{ steps.dev_version.outputs.dev_version }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Running bump-my-version replace using injected config"
          bump-my-version replace --allow-dirty || { echo "bump-my-version replace failed" >&2; exit 1; }
          echo "Replacement complete. Showing updated versions:"
          grep -E 'version =|"version":' pyproject.toml frontend/app/package.json || true

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > frontend/app/android/finanze-release.jks

      - name: Build full variant
        working-directory: frontend/app
        run: |
          pnpm build:mobile
          pnpm exec cap sync android

      - name: Build full APK & AAB
        working-directory: frontend/app/android
        env:
          STORE_FILE: ${{ github.workspace }}/frontend/app/android/finanze-release.jks
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleFullRelease bundleFullRelease

      - name: Build store variant
        working-directory: frontend/app
        run: |
          pnpm build:mobile:store
          pnpm exec cap sync android

      - name: Build store APK & AAB
        working-directory: frontend/app/android
        env:
          STORE_FILE: ${{ github.workspace }}/frontend/app/android/finanze-release.jks
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleStoreRelease bundleStoreRelease

      - name: Rename outputs
        shell: bash
        run: |
          VERSION=${{ steps.dev_version.outputs.dev_version }}
          mkdir -p dist-android
          cp frontend/app/android/app/build/outputs/apk/full/release/app-full-release.apk dist-android/Finanze-${VERSION}-android-full.apk
          cp frontend/app/android/app/build/outputs/bundle/fullRelease/app-full-release.aab dist-android/Finanze-${VERSION}-android-full.aab
          cp frontend/app/android/app/build/outputs/apk/store/release/app-store-release.apk dist-android/Finanze-${VERSION}-android-store.apk
          cp frontend/app/android/app/build/outputs/bundle/storeRelease/app-store-release.aab dist-android/Finanze-${VERSION}-android-store.aab

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v6
        with:
          name: finanze-${{ steps.dev_version.outputs.dev_version }}-android
          path: dist-android/
          if-no-files-found: warn

      - name: Update PR comment with Android status
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.dev_version.outputs.dev_version }}';
            const runId = context.runId;
            const prNumber = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
              owner,
              repo,
              run_id: runId,
            });

            const formatSize = (bytes) => {
              const mb = bytes / 1024 / 1024;
              return mb >= 1024 ? `${(mb / 1024).toFixed(2)} GB` : `${mb.toFixed(1)} MB`;
            };

            const platformMap = {
              'macos-latest': { label: 'macOS', arch: 'ARM64 (Apple Silicon)', icon: '🍎', type: '.dmg' },
              'macos-15-intel': { label: 'macOS', arch: 'Intel x64', icon: '🍎', type: '.dmg' },
              'ubuntu-latest': { label: 'Linux', arch: 'x64', icon: '🐧', type: '.AppImage' },
              'windows-latest': { label: 'Windows', arch: 'x64', icon: '🪟', type: '.exe' },
            };

            let desktopRows = '';
            for (const [osKey, info] of Object.entries(platformMap)) {
              const artifactName = `finanze-${version}-${osKey}`;
              const artifact = artifacts.artifacts.find(a => a.name === artifactName);
              if (artifact) {
                const size = formatSize(artifact.size_in_bytes);
                const downloadUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${artifact.id}`;
                desktopRows += `| ${info.icon} ${info.label} | ${info.arch} | \`${info.type}\` | ${size} | [Download](${downloadUrl}) |\n`;
              } else {
                desktopRows += `| ${info.icon} ${info.label} | ${info.arch} | \`${info.type}\` | — | ⏳ Building... |\n`;
              }
            }

            const androidArtifactName = `finanze-${version}-android`;
            const androidArtifact = artifacts.artifacts.find(a => a.name === androidArtifactName);
            let androidSection;
            if (androidArtifact) {
              const size = formatSize(androidArtifact.size_in_bytes);
              const downloadUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${androidArtifact.id}`;
              androidSection = [
