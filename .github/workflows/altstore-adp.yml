name: AltStore ADP Upload

on:
  workflow_dispatch:
    inputs:
      adp_id:
        description: 'ADP ID from AltStore'
        required: true
        type: string
      version:
        description: 'Version number (e.g. 0.8.1). Leave empty for latest release.'
        required: false
        type: string
      build_version:
        description: 'Build version number'
        required: false
        type: string
        default: '1'
      min_os_version:
        description: 'Minimum iOS version'
        required: false
        type: string
        default: '15.0'

permissions:
  contents: write

jobs:
  upload-adp:
    name: Download & Upload ADP
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version and validate release
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [ -z "$INPUT_VERSION" ]; then
            echo "No version provided, fetching latest release..."
            LATEST_TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q '.tagName')
            if [ -z "$LATEST_TAG" ]; then
              echo "::error::No releases found in the repository."
              exit 1
            fi
            VERSION="${LATEST_TAG#v}"
            echo "Resolved latest release: $LATEST_TAG (version $VERSION)"
          else
            VERSION="$INPUT_VERSION"
            VERSION_TAG="v$VERSION"
            echo "Checking for release: $VERSION_TAG"
            if ! gh release view "$VERSION_TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
              echo "::error::Release $VERSION_TAG does not exist. Create the release first."
              exit 1
            fi
            echo "Release $VERSION_TAG found."
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fetch ADP status
        id: adp
        run: |
          ADP_ID="${{ inputs.adp_id }}"
          echo "Fetching ADP: $ADP_ID"

          RESPONSE=$(curl -sf "https://api.altstore.io/adps/$ADP_ID")
          echo "ADP API response:"
          echo "$RESPONSE" | jq .

          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.downloadURL')
          UPDATED=$(echo "$RESPONSE" | jq -r '.updated')

          if [ "$STATUS" != "success" ]; then
            echo "::error::ADP status is '$STATUS', expected 'success'."
            exit 1
          fi

          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
            echo "::error::No downloadURL in ADP response."
            exit 1
          fi

          DOWNLOAD_EXPIRED=$(echo "$RESPONSE" | jq -r '.downloadExpired')
          if [ "$DOWNLOAD_EXPIRED" = "true" ]; then
            echo "::error::ADP download link has expired. Re-process the ADP."
            exit 1
          fi

          DATE_ONLY=$(echo "$UPDATED" | cut -dT -f1)

          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "date=$DATE_ONLY" >> "$GITHUB_OUTPUT"

      - name: Download and unzip ADP
        run: |
          mkdir -p adp_contents
          curl -sfL "${{ steps.adp.outputs.download_url }}" -o adp.zip
          unzip adp.zip -d adp_contents
          echo "ADP contents:"
          ls -la adp_contents/

      - name: Inspect ADP and generate versions JSON
        id: json
        run: |
          cd adp_contents

          if [ ! -f manifest.json ]; then
            echo "::error::manifest.json not found in ADP."
            exit 1
          fi
          if [ ! -f signature ]; then
            echo "::error::signature not found in ADP."
            exit 1
          fi

          IPA_FILES=$(find . -name '*.ipa' -type f)
          if [ -z "$IPA_FILES" ]; then
            echo "::error::No .ipa files found in ADP."
            exit 1
          fi

          echo "Found IPA variants:"
          echo "$IPA_FILES"

          FIRST_IPA=$(echo "$IPA_FILES" | head -1)
          IPA_SIZE=$(stat -c%s "$FIRST_IPA")

          VERSION="${{ steps.version.outputs.version }}"
          BUILD_VERSION="${{ inputs.build_version }}"
          MIN_OS="${{ inputs.min_os_version }}"
          DATE="${{ steps.adp.outputs.date }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"

          ASSET_URLS=$(jq -n \
            --arg manifestURL "$BASE_URL/altstore-manifest.json" \
            --arg signatureURL "$BASE_URL/altstore-signature" \
            '{"manifest": $manifestURL, "signature": $signatureURL}')

          while IFS= read -r ipa_path; do
            IPA_FILENAME=$(basename "$ipa_path")
            IPA_UUID="${IPA_FILENAME%.ipa}"
            ASSET_URLS=$(echo "$ASSET_URLS" | jq \
              --arg uuid "$IPA_UUID" \
              --arg url "$BASE_URL/altstore-$IPA_FILENAME" \
              '. + {($uuid): $url}')
          done <<< "$IPA_FILES"

          VERSIONS_JSON=$(jq -n \
            --arg version "$VERSION" \
            --arg buildVersion "$BUILD_VERSION" \
            --arg date "$DATE" \
            --arg downloadURL "$BASE_URL/altstore-manifest.json" \
            --argjson size "$IPA_SIZE" \
            --arg minOS "$MIN_OS" \
            --argjson assetURLs "$ASSET_URLS" \
            '{
              version: $version,
              buildVersion: $buildVersion,
              date: $date,
              localizedDescription: "",
              downloadURL: $downloadURL,
              size: $size,
              minOSVersion: $minOS,
              assetURLs: $assetURLs
            }')

          echo "=== Versions Entry JSON ==="
          echo "$VERSIONS_JSON" | jq .
          echo "=========================="

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## AltStore Versions Entry

          \`\`\`json
          $(echo "$VERSIONS_JSON" | jq .)
          \`\`\`
          EOF

      - name: Upload ADP files to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION_TAG="v${{ steps.version.outputs.version }}"
          cd adp_contents

          mv manifest.json altstore-manifest.json
          mv signature altstore-signature
          for ipa in $(find . -name '*.ipa' -type f); do
            IPA_NAME=$(basename "$ipa")
            IPA_DIR=$(dirname "$ipa")
            mv "$ipa" "$IPA_DIR/altstore-$IPA_NAME"
          done

          UPLOAD_FILES="altstore-manifest.json altstore-signature"
          for ipa in $(find . -name 'altstore-*.ipa' -type f); do
            UPLOAD_FILES="$UPLOAD_FILES $ipa"
          done

          gh release upload "$VERSION_TAG" \
            $UPLOAD_FILES \
            --repo "${{ github.repository }}" \
            --clobber
          echo "ADP files uploaded to release $VERSION_TAG"
