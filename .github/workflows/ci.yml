name: CI

on:
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14.2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        run: pytest

  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14.2

      - name: Install Python linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lint.txt

      - name: Check Python formatting with ruff
        run: |
          echo "Checking Python code formatting..."
          ruff check .
          ruff format --check .

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/app/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/app/.nvmrc

      - name: Install frontend dependencies
        working-directory: frontend/app
        run: pnpm install --frozen-lockfile

      - name: Check frontend linting
        working-directory: frontend/app
        run: pnpm run lint

      - name: Check frontend formatting with prettier
        working-directory: frontend/app
        run: pnpm exec prettier --check .

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14.2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/app/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/app/.nvmrc

      - name: Install frontend dependencies
        working-directory: frontend/app
        run: pnpm install --frozen-lockfile

      - name: Install E2E dependencies
        working-directory: e2e/standard
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: e2e/standard
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e/standard
        run: pnpm test

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: e2e/standard/test-results/
          retention-days: 7

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/app/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/app/.nvmrc

      - name: Install frontend dependencies
        working-directory: frontend/app
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        working-directory: frontend/app
        run: pnpm test

