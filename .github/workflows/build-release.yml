name: Build Release

on:
  pull_request:
    types: [closed]

jobs:

  build-app:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'release/')

    strategy:
      matrix:
        os: [ macos-latest, macos-15-intel, windows-latest, ubuntu-latest ]

    runs-on: ${{ matrix.os }}

    permissions: write-all

    steps:
      - uses: actions/checkout@v6

      - name: Determine Release Tag
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "RELEASE_TAG=v${BRANCH_NAME#release/}" >> $GITHUB_ENV
        shell: bash

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/app/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/app/.nvmrc

      - name: Setup python (non-macOS)
        if: ${{ !startsWith(matrix.os, 'macos-') }}
        uses: actions/setup-python@v6
        with:
          python-version: 3.14.2

      - name: Setup python (macOS)
        if: ${{ startsWith(matrix.os, 'macos-') }}
        shell: bash
        run: |
          brew install pyenv pyenv-virtualenv

          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PATH"
          
          # Initialize pyenv and pyenv-virtualenv for the current shell
          eval "$(pyenv init --path)" # Ensures pyenv command is found via shims/bin
          eval "$(pyenv init -)"      # Sets up shims and other integrations
          eval "$(pyenv virtualenv-init -)" # Defines 'pyenv activate' and other venv functions

          pyenv install --skip-existing 3.14.2
          
          # Create virtualenv if it doesn't exist
          if ! pyenv virtualenvs --bare | grep -q "^finanze$"; then
            pyenv virtualenv 3.14.2 finanze
          else
            echo "Virtualenv 'finanze' already exists."
          fi
          
          # Activate for this script block (confirms setup)
          pyenv activate finanze
          
          # Set for pyenv to use this venv in the current directory context
          pyenv local finanze
          
          # Make pyenv and the virtualenv available to subsequent steps in the job
          echo "$PYENV_ROOT/bin" >> $GITHUB_PATH
          echo "$PYENV_ROOT/shims" >> $GITHUB_PATH
          echo "$PYENV_ROOT/versions/finanze/bin" >> $GITHUB_PATH

      - name: Install packaging & runtime deps
        shell: bash
        run: |
          pip install -r requirements-packaging.txt -r requirements.txt

      - name: Setup virtual env (non-Windows)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        shell: bash
        run: |
          python3 -m venv $HOME/venv
          echo "$HOME/venv/bin" >> $GITHUB_PATH

      - name: Package
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          CSC_FOR_PULL_REQUEST: true
          CSC_LINK: ${{ startsWith(matrix.os, 'macos-') && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ startsWith(matrix.os, 'macos-') && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ startsWith(matrix.os, 'macos-') && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ startsWith(matrix.os, 'macos-') && secrets.APPLE_TEAM_ID || '' }}
        shell: bash
        run: |
          # Determine OS and arch parameters
          OS_PARAM=""
          
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            OS_PARAM="--os mac --arch arm64"
          elif [[ "${{ matrix.os }}" == "macos-15-intel" ]]; then
            OS_PARAM="--os mac --arch x64"
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            OS_PARAM="--os linux"
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            OS_PARAM="--os win"
          fi
          
          python3 package.py --target full $OS_PARAM

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ env.RELEASE_TAG }}" dist/* --clobber

  build-android:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'release/')

    runs-on: ubuntu-latest

    permissions: write-all

    steps:
      - uses: actions/checkout@v6

      - name: Determine Release Tag
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "RELEASE_TAG=v${BRANCH_NAME#release/}" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${BRANCH_NAME#release/}" >> $GITHUB_ENV
        shell: bash

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          package_json_file: frontend/app/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: frontend/app/.nvmrc

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14.2

      - name: Install Python build deps
        run: pip install python-minifier

      - name: Install packaging & runtime deps
        shell: bash
        run: pip install -r requirements-packaging.txt -r requirements.txt

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;28.0.13004108'

      - name: Install frontend dependencies
        working-directory: frontend/app
        run: pnpm install --frozen-lockfile

      - name: Build native TLS client (Android)
        working-directory: frontend/app
        run: |
          bash native/tlsclient/build.sh --platform android
          bash native/tlsclient/install.sh

      - name: Setup Pyodide & Python wheels
        working-directory: frontend/app
        run: pnpm install:pyodide

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > frontend/app/android/finanze-release.jks

      - name: Build full variant
        working-directory: frontend/app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}
        run: |
          pnpm build:mobile
          pnpm exec cap sync android

      - name: Build full APK & AAB
        working-directory: frontend/app/android
        env:
          STORE_FILE: ${{ github.workspace }}/frontend/app/android/finanze-release.jks
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleFullRelease bundleFullRelease

      - name: Build store variant
        working-directory: frontend/app
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}
        run: |
          pnpm build:mobile:store
          pnpm exec cap sync android

      - name: Build store APK & AAB
        working-directory: frontend/app/android
        env:
          STORE_FILE: ${{ github.workspace }}/frontend/app/android/finanze-release.jks
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleStoreRelease bundleStoreRelease

      - name: Rename outputs
        shell: bash
        run: |
          VERSION=${{ env.RELEASE_VERSION }}
          mkdir -p dist
          cp frontend/app/android/app/build/outputs/apk/full/release/app-full-release.apk dist/Finanze-${VERSION}-android-full.apk
          cp frontend/app/android/app/build/outputs/bundle/fullRelease/app-full-release.aab dist/Finanze-${VERSION}-android-full.aab
          cp frontend/app/android/app/build/outputs/apk/store/release/app-store-release.apk dist/Finanze-${VERSION}-android-store.apk
          cp frontend/app/android/app/build/outputs/bundle/storeRelease/app-store-release.aab dist/Finanze-${VERSION}-android-store.aab

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ env.RELEASE_TAG }}" dist/* --clobber

  docker-release:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'release/')

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine Release Tag
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "RELEASE_TAG=${BRANCH_NAME#release/}" >> $GITHUB_ENV
        shell: bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Publish frontend image
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: finanze/finanze-frontend
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          default_branch: main
          workdir: frontend
          platforms: linux/amd64,linux/arm64/v8
          buildargs: VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }},VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          tags: |
            ${{ env.RELEASE_TAG }},latest

      - name: Publish selenium image
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: finanze/finanze
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          default_branch: main
          platforms: linux/amd64,linux/arm64/v8
          buildargs: SELENIUM_SUPPORT=true
          tags: |
            ${{ env.RELEASE_TAG }}-selenium,latest-selenium

      - name: Publish no-selenium image
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: finanze/finanze
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          default_branch: main
          platforms: linux/amd64,linux/arm64/v8
          buildargs: SELENIUM_SUPPORT=false
          tags: |
            ${{ env.RELEASE_TAG }}-no-selenium,${{ env.RELEASE_TAG }},latest-no-selenium,latest

  update-release-description:
    if: |
      always() &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    needs: [build-app, build-android, docker-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine Release Tag
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "RELEASE_TAG=v${BRANCH_NAME#release/}" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${BRANCH_NAME#release/}" >> $GITHUB_ENV
        shell: bash

      - name: Update release description with build table
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;
            const version = process.env.RELEASE_VERSION;

            let release;
            for (let attempt = 0; attempt < 10; attempt++) {
              try {
                const resp = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
                release = resp.data;
                break;
              } catch (e) {
                if (attempt < 9) {
                  core.info(`Release not found yet (attempt ${attempt + 1}/10), waiting 30s...`);
                  await new Promise(r => setTimeout(r, 30000));
                } else {
                  core.setFailed(`Release for tag ${tag} not found after 10 attempts`);
                  return;
                }
              }
            }

            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner, repo, release_id: release.id,
            });

            const formatSize = (bytes) => {
              const mb = bytes / 1024 / 1024;
              return mb >= 1024 ? `${(mb / 1024).toFixed(2)} GB` : `${mb.toFixed(1)} MB`;
            };

            const desktopBuilds = [
              { icon: '🍎', label: 'macOS', arch: 'ARM64 (Apple Silicon)', pattern: '-mac-arm64.dmg' },
              { icon: '🍎', label: 'macOS', arch: 'Intel x64', pattern: '-mac-x64.dmg' },
              { icon: '🐧', label: 'Linux', arch: 'x64', pattern: '-linux-x86_64.AppImage' },
              { icon: '🪟', label: 'Windows', arch: 'x64', pattern: '-win-x64.exe' },
            ];

            const buildAppResult = '${{ needs.build-app.result }}';
            let desktopRows = '';
            for (const build of desktopBuilds) {
              const asset = assets.find(a => a.name.endsWith(build.pattern));
              if (asset) {
                const size = formatSize(asset.size);
                desktopRows += `| ${build.icon} ${build.label} | ${build.arch} | ${size} | [Download](${asset.browser_download_url}) |\n`;
              } else {
                const status = buildAppResult === 'failure' ? '❌ Failed' : buildAppResult === 'cancelled' ? '⚪ Cancelled' : '⚠️ Not found';
                desktopRows += `| ${build.icon} ${build.label} | ${build.arch} | — | ${status} |\n`;
              }
            }

            const androidBuilds = [
              { type: '.apk', pattern: `-android-full.apk` },
              { type: '.aab', pattern: `-android-full.aab` },
            ];

            const buildAndroidResult = '${{ needs.build-android.result }}';
            let androidRows = '';
            for (const build of androidBuilds) {
              const asset = assets.find(a => a.name.endsWith(build.pattern));
              if (asset) {
                const size = formatSize(asset.size);
                androidRows += `| \`${build.type}\` | ${size} | [Download](${asset.browser_download_url}) |\n`;
              } else {
                const status = buildAndroidResult === 'failure' ? '❌ Failed' : buildAndroidResult === 'cancelled' ? '⚪ Cancelled' : '⚠️ Not found';
                androidRows += `| \`${build.type}\` | — | ${status} |\n`;
              }
            }

            const dockerResult = '${{ needs.docker-release.result }}';
            let dockerSection;
            if (dockerResult === 'success') {
              dockerSection = [
                `| Image | Tag | Pull Command |`,
                `|-------|-----|-------------|`,
                `| \`finanze/finanze\` | \`${version}\` | \`docker pull finanze/finanze:${version}\` |`,
                `| \`finanze/finanze-frontend\` | \`${version}\` | \`docker pull finanze/finanze-frontend:${version}\` |`,
              ].join('\n');
            } else if (dockerResult === 'failure') {
              dockerSection = `❌ Docker build failed.`;
            } else if (dockerResult === 'cancelled') {
              dockerSection = `⚪ Docker build was cancelled.`;
            } else {
              dockerSection = `⚠️ Docker build status unknown.`;
            }

            const table = [
              ``,
              `## 📦 Build Assets`,
              ``,
              `### Desktop`,
              ``,
              `| Platform | Architecture | Size | Link |`,
              `|----------|-------------|------|------|`,
              desktopRows.trim(),
              ``,
              `### 📱 Android`,
              ``,
              `| Type | Size | Link |`,
              `|------|------|------|`,
              androidRows.trim(),
              ``,
              `### 🐳 Docker Images`,
              ``,
              dockerSection,
            ].join('\n');

            const existingBody = release.body || '';
            const buildMarker = '## 📦 Build Assets';
            let newBody;
            if (existingBody.includes(buildMarker)) {
              newBody = existingBody.substring(0, existingBody.indexOf(buildMarker)).trimEnd() + '\n' + table;
            } else {
              newBody = existingBody.trimEnd() + '\n' + table;
            }

            await github.rest.repos.updateRelease({
              owner, repo, release_id: release.id,
              body: newBody,
            });
